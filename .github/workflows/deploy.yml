name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

# Set permissions for GITHUB_TOKEN
permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git-based features

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./docs
        run: bun install --frozen-lockfile

      # Future: Add translation layer steps here
      # - name: Transform Obsidian content
      #   run: bun run transform

      - name: Build site
        working-directory: ./docs
        run: bun run build

      - name: Create Cloudflare Pages project
        # Create project if it doesn't exist (runs before deploy)
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create cyberbase-testing --production-branch=main
        continue-on-error: true  # Ignore if project already exists

      - name: Deploy to Cloudflare Pages
        # Deploy on push to main or manual trigger (not PRs)
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=cyberbase-testing --commit-dirty=true

      # For PRs, just build and report success
      - name: Build status
        if: github.event_name == 'pull_request'
        run: echo "Build successful! Ready for merge."
